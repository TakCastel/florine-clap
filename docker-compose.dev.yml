# Override pour le développement local (hot reload)
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d frontend

services:
  frontend:
    build:
      target: dev
    image: florine-clap-frontend:dev
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - ./front:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
